_BASE_: ../mask2former_COCO-OLAC_R50_bs16_50ep.yaml
MODEL:
  BACKBONE:
    NAME: "D2DINOv3"
    FREEZE_AT: 0
  WEIGHTS: ""  # DINOv3 ckpt is loaded via MODEL.DINOV3.CHECKPOINT (safetensors)
  # DINOv3 was trained with ImageNet-ish 0.5/0.5 normalization on [0,1] inputs.
  # Detectron2 feeds raw [0,255]; the equivalent is mean=127.5, std=127.5.
  PIXEL_MEAN: [127.5, 127.5, 127.5]
  PIXEL_STD: [127.5, 127.5, 127.5]
  DINOV3:
    CHECKPOINT: "mask2former/pretrained/dinov3_vitl16.safetensors"
    # patch_size=16 cleanly divides 512 (32×32 patch grid) — no resize hack
    # needed, unlike SAM3's patch_size=14.
    IMG_SIZE: 512
    OUT_CHANNELS: 256
    SIZE_DIVISIBILITY: 32
    FREEZE_BACKBONE: True
  MASK_FORMER:
    NUM_OBJECT_QUERIES: 200
  PEMOLA:
    PE_MODULATION: True
SOLVER:
  # Tuned for 2× RTX 4090 (24 GB). DINOv3 ViT-L/16 has 24 layers (vs SAM3's
  # 32) and patch=16 (fewer tokens), so it's ~25-40% faster per iter than
  # SAM3 at the same batch size.
  IMS_PER_BATCH: 16
  BASE_LR: 0.00005
  BACKBONE_MULTIPLIER: 0.1   # ViT trunk frozen (skipped by optimizer); applies to SFP neck only
  STEPS: (84168, 88845)
  MAX_ITER: 93520
OUTPUT_DIR: output/pemola_dinov3
